<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0e100f" />
    <meta name="color-scheme" content="dark" />
    <meta
      name="description"
      content="Hermes Voice – der eigenständige, deutschsprachige Sprachassistent."
    />
    <link rel="manifest" href="/voice/manifest.json" />
    <link rel="icon" href="/voice/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/voice/icon-192.png" />
    <title>Hermes Voice</title>
    <style>
      /* Token sheet copied 1:1 from web/src/control/theme.css ("Bronze auf
         Graphit") — voice_client is a standalone vanilla app and does not
         import the /control theme, so the values are duplicated here as
         plain CSS custom properties. Keep in sync by hand if theme.css
         changes the calibrated palette. */
      :root {
        --color-surface-0: #0e100f;
        --color-surface-1: #141715;
        --color-surface-2: #1a1e1b;
        --color-surface-3: #232824;
        --color-line: #2a302b;
        --color-line-soft: #1e2420;
        --color-live: #c9884a;
        --color-bronze: #c9884a;
        --color-bronze-hi: #dda05f;
        --color-status-ok: #86b97e;
        --color-status-warn: #d9b23a;
        --color-status-alert: #e0604f;
        --color-spar: #5fb8a8;
        --color-spar-hi: #7bd0c0;
        --color-ink: #ebe7de;
        --color-ink-2: #a9a59b;
        --color-ink-3: #757166;
        --radius-panel: 10px;
        --radius-card: 7px;

        /* Voice-local aliases: the state the app is actually IN drives the
           dominant accent everywhere (orb, action button, focus rings).
           `--accent`/`--accent-hi` default to bronze (live); the mode
           attribute on <body> (data-mode) swaps them to the cool teal spar
           channel once the budget-saver mode ships (next slice) — the
           switch itself is wired now so that slice is CSS-only. */
        --accent: var(--color-bronze);
        --accent-hi: var(--color-bronze-hi);

        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        color: var(--color-ink);
        background: var(--color-surface-0);
        font-synthesis: none;
      }

      body[data-mode="spar"] {
        --accent: var(--color-spar);
        --accent-hi: var(--color-spar-hi);
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-width: 20rem;
        min-height: 100svh;
        margin: 0;
        background:
          radial-gradient(circle at 50% -10%, color-mix(in srgb, var(--accent) 20%, transparent), transparent 42%),
          linear-gradient(165deg, var(--color-surface-1) 0%, var(--color-surface-0) 55%, #050605 100%);
        transition: background 220ms ease-out;
      }

      body::before {
        position: fixed;
        inset: 0;
        z-index: -1;
        content: "";
        opacity: 0.14;
        background-image: linear-gradient(rgba(235, 231, 222, 0.05) 1px, transparent 1px);
        background-size: 100% 3rem;
        mask-image: linear-gradient(to bottom, black, transparent 70%);
      }

      main {
        display: grid;
        width: min(100%, 48rem);
        min-height: 100svh;
        margin: 0 auto;
        padding:
          max(1.25rem, env(safe-area-inset-top))
          max(1rem, env(safe-area-inset-right))
          max(1.25rem, env(safe-area-inset-bottom))
          max(1rem, env(safe-area-inset-left));
        gap: 1rem;
        grid-template-rows: auto auto 1fr auto;
      }

      .brand {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.5rem;
        row-gap: 0.5rem;
        color: var(--color-ink-2);
        letter-spacing: 0.13em;
        text-transform: uppercase;
      }

      .brand img {
        width: 2rem;
        height: 2rem;
      }

      .brand h1 {
        margin: 0 0.2rem 0 0;
        color: var(--color-ink);
        font-size: 0.82rem;
        font-weight: 700;
      }

      #mode-badge {
        display: inline-flex;
        align-items: center;
        min-height: 1.6rem;
        padding: 0.2rem 0.6rem;
        border: 1px solid var(--color-line);
        border-radius: 999px;
        font-size: 0.62rem;
        font-weight: 750;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      #mode-badge[data-mode="live"] {
        color: var(--color-bronze-hi);
        border-color: color-mix(in srgb, var(--color-bronze) 55%, transparent);
        background: color-mix(in srgb, var(--color-bronze) 16%, transparent);
      }

      #mode-badge[data-mode="fallback"] {
        color: #fbe3a1;
        border-color: color-mix(in srgb, var(--color-status-warn) 55%, transparent);
        background: color-mix(in srgb, var(--color-status-warn) 16%, transparent);
      }

      .chip-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.35rem;
        min-height: 2.75rem;
        padding: 0.35rem 0.75rem;
        border: 1px solid var(--color-line);
        border-radius: 999px;
        color: var(--color-ink-2);
        background: var(--color-surface-2);
        font: inherit;
        font-size: 0.68rem;
        font-weight: 750;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        cursor: pointer;
        transition: transform 140ms ease-out, background 140ms ease-out, border-color 140ms ease-out;
        touch-action: manipulation;
      }

      .chip-button:hover:not(:disabled) {
        border-color: color-mix(in srgb, var(--accent) 55%, var(--color-line));
        background: var(--color-surface-3);
        transform: translateY(-1px);
      }

      .chip-button:focus-visible {
        outline: 2px solid var(--accent-hi);
        outline-offset: 2px;
      }

      .chip-button:disabled {
        color: var(--color-ink-3);
        cursor: not-allowed;
        opacity: 0.55;
      }

      .chip-button[aria-pressed="true"] {
        color: #fff1f2;
        background: var(--color-status-alert);
        border-color: color-mix(in srgb, var(--color-status-alert) 65%, transparent);
      }

      .share-hint {
        flex-basis: 100%;
        color: var(--color-ink-3);
        font-size: 0.68rem;
        letter-spacing: 0.01em;
        line-height: 1.35;
        text-transform: none;
      }

      .share-hint[hidden] {
        display: none;
      }

      .sharing-indicator {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        min-height: 1.75rem;
        /* class beats the UA [hidden] rule — restate it or the pill
           renders permanently (ui-verifier catch 2026-07-10) */
        padding: 0.2rem 0.6rem;
        border: 1px solid color-mix(in srgb, var(--color-status-alert) 55%, transparent);
        border-radius: 999px;
        color: #fecdd3;
        background: color-mix(in srgb, var(--color-status-alert) 16%, transparent);
        font-size: 0.62rem;
        font-weight: 750;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      .sharing-indicator[hidden] {
        display: none;
      }

      .sharing-dot {
        width: 0.5rem;
        height: 0.5rem;
        border-radius: 50%;
        background: var(--color-status-alert);
        animation: sharing-pulse 1.2s ease-in-out infinite;
      }

      @keyframes sharing-pulse {
        50% {
          opacity: 0.3;
          transform: scale(0.65);
        }
      }

      .sharing-preview {
        width: 96px;
        height: auto;
        max-height: 72px;
        border-radius: var(--radius-card);
        border: 1px solid var(--color-line);
        object-fit: cover;
      }

      .state-card,
      .transcript-card {
        border: 1px solid var(--color-line);
        border-radius: var(--radius-panel);
        background: color-mix(in srgb, var(--color-surface-1) 92%, transparent);
        box-shadow: 0 1.5rem 4rem rgba(0, 0, 0, 0.28);
        backdrop-filter: blur(1rem);
      }

      .state-card {
        position: relative;
        display: grid;
        min-height: 16rem;
        padding: 2rem 1.5rem;
        overflow: hidden;
        place-items: center;
        text-align: center;
      }

      /* Status orb — the single dominant per-state visual: idle/connecting/
         listening ("live")/thinking/speaking/error each get a distinct
         color + motion so the session state reads at a glance without
         parsing the copy underneath it. */
      .status-orb {
        position: absolute;
        top: 50%;
        left: 50%;
        z-index: 0;
        width: 13rem;
        height: 13rem;
        border-radius: 50%;
        background: radial-gradient(
          circle at 50% 42%,
          color-mix(in srgb, var(--orb-color, var(--color-ink-3)) 38%, transparent),
          transparent 68%
        );
        transform: translate(-50%, -50%) scale(1);
        pointer-events: none;
        transition: background 220ms ease-out;
      }

      .status-orb::before,
      .status-orb::after {
        position: absolute;
        inset: 0;
        border: 1px solid color-mix(in srgb, var(--orb-color, var(--color-ink-3)) 55%, transparent);
        border-radius: 50%;
        content: "";
      }

      .status-orb::after {
        inset: 2.1rem;
        background: color-mix(in srgb, var(--orb-color, var(--color-ink-3)) 22%, transparent);
        box-shadow: 0 0 2.5rem color-mix(in srgb, var(--orb-color, var(--color-ink-3)) 45%, transparent);
      }

      body[data-voice-state="idle"] .status-orb {
        --orb-color: var(--color-ink-3);
      }

      body[data-voice-state="connecting"] .status-orb {
        --orb-color: var(--accent);
        animation: orb-breathe 1.6s ease-in-out infinite;
      }

      body[data-voice-state="listening"] .status-orb {
        --orb-color: var(--accent);
        animation: orb-breathe 2.4s ease-in-out infinite;
      }

      body[data-voice-state="thinking"] .status-orb {
        --orb-color: var(--color-status-warn);
        animation: orb-rotate 1.5s linear infinite;
      }

      body[data-voice-state="speaking"] .status-orb {
        --orb-color: var(--color-status-ok);
        animation: orb-speak 650ms ease-in-out infinite alternate;
      }

      body[data-voice-state="error"] .status-orb {
        --orb-color: var(--color-status-alert);
      }

      @keyframes orb-breathe {
        50% {
          transform: translate(-50%, -50%) scale(1.07);
        }
      }

      @keyframes orb-rotate {
        50% {
          transform: translate(-50%, -50%) rotate(180deg) scale(0.94);
        }
        100% {
          transform: translate(-50%, -50%) rotate(360deg) scale(1);
        }
      }

      @keyframes orb-speak {
        to {
          transform: translate(-50%, -50%) scale(1.09);
        }
      }

      .state-copy {
        position: relative;
        z-index: 1;
      }

      #voice-status {
        margin: 0;
        color: var(--color-ink);
        font-size: clamp(2.6rem, 14vw, 5.8rem);
        font-weight: 720;
        line-height: 0.94;
        letter-spacing: -0.05em;
      }

      #status-detail {
        max-width: 31rem;
        min-height: 2.8em;
        margin: 1.1rem auto 0;
        color: var(--color-ink-2);
        font-size: 0.98rem;
        line-height: 1.45;
      }

      .usage-meter {
        display: grid;
        gap: 0.35rem;
        width: min(100%, 22rem);
        margin: 1rem auto 0;
      }

      /* class beats the UA [hidden] rule — restate it or the meter renders
         permanently (same trap as .sharing-indicator above). */
      .usage-meter[hidden] {
        display: none;
      }

      .usage-meter-track {
        height: 0.4rem;
        overflow: hidden;
        border-radius: 999px;
        background: var(--color-surface-2);
      }

      .usage-meter-fill {
        height: 100%;
        width: var(--usage-pct, 0%);
        background: var(--accent);
        border-radius: 999px;
        transition: width 260ms ease-out, background 220ms ease-out;
      }

      .usage-meter--warn .usage-meter-fill {
        background: var(--color-status-warn);
      }

      .usage-line {
        margin: 0;
        color: var(--color-ink-2);
        font-family: "IBM Plex Mono", ui-monospace, "Courier New", monospace;
        font-size: 0.76rem;
        font-weight: 600;
        letter-spacing: 0.01em;
      }

      .usage-line--warn {
        color: var(--color-status-warn);
      }

      .transcript-card {
        min-height: 10rem;
        padding: 1.25rem;
      }

      .section-title {
        margin: 0 0 1rem;
        color: var(--color-ink-3);
        font-size: 0.72rem;
        font-weight: 750;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      #transcript {
        display: grid;
        gap: 0.6rem;
        scroll-behavior: smooth;
      }

      #transcript-empty {
        margin: 2rem 0;
        color: var(--color-ink-3);
        text-align: center;
      }

      .transcript-entry {
        display: grid;
        max-width: 92%;
        padding: 0.9rem 1rem;
        gap: 0.2rem;
        border-radius: var(--radius-card) var(--radius-card) var(--radius-card) 0.2rem;
        background: var(--color-surface-2);
        border: 1px solid var(--color-line-soft);
        justify-self: start;
      }

      .transcript-entry--assistant {
        justify-self: end;
        border-radius: var(--radius-card) var(--radius-card) 0.2rem var(--radius-card);
        background: color-mix(in srgb, var(--accent) 12%, var(--color-surface-2));
        border-color: color-mix(in srgb, var(--accent) 35%, var(--color-line-soft));
      }

      .transcript-role,
      .transcript-text {
        margin: 0;
      }

      .transcript-role {
        color: var(--color-ink-3);
        font-size: 0.68rem;
        font-weight: 750;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .transcript-entry--assistant .transcript-role {
        color: var(--accent-hi);
      }

      .transcript-text {
        color: var(--color-ink);
        line-height: 1.5;
        overflow-wrap: anywhere;
      }

      .transcript-entry--tool {
        justify-self: start;
        display: inline-flex;
        align-items: center;
        max-width: none;
        padding: 0.35rem 0.7rem;
        border-radius: 999px;
        background: var(--color-surface-2);
        border-color: var(--color-line);
      }

      .transcript-entry--tool .transcript-role {
        color: var(--color-ink-3);
      }

      .transcript-entry--tool .transcript-text {
        color: var(--color-ink-2);
        font-family: "IBM Plex Mono", ui-monospace, "Courier New", monospace;
        font-size: 0.78rem;
      }

      #composer {
        display: flex;
        gap: 0.5rem;
        margin-top: 1rem;
      }

      #composer-input {
        flex: 1;
        min-width: 0;
        min-height: 2.75rem;
        padding: 0.65rem 1rem;
        border: 1px solid var(--color-line);
        border-radius: 999px;
        color: var(--color-ink);
        background: var(--color-surface-2);
        font: inherit;
        font-size: 0.92rem;
      }

      #composer-input::placeholder {
        color: var(--color-ink-3);
      }

      #composer-input:focus-visible {
        outline: 2px solid var(--accent-hi);
        outline-offset: 2px;
      }

      #composer-input[aria-disabled="true"] {
        color: var(--color-ink-3);
      }

      #composer-submit {
        min-height: 2.75rem;
        padding: 0 1.2rem;
        border: 0;
        border-radius: 999px;
        color: var(--color-surface-0);
        background: var(--accent);
        font: inherit;
        font-size: 0.82rem;
        font-weight: 750;
        cursor: pointer;
        transition: transform 120ms ease-out, background 120ms ease-out;
        touch-action: manipulation;
      }

      #composer-submit:hover {
        background: var(--accent-hi);
        transform: translateY(-1px);
      }

      #composer-submit:focus-visible {
        outline: 2px solid var(--accent-hi);
        outline-offset: 2px;
      }

      .action-bar {
        position: sticky;
        bottom: max(0.75rem, env(safe-area-inset-bottom));
        z-index: 2;
        display: grid;
        padding-top: 0.5rem;
      }

      #session-button {
        min-height: 4.25rem;
        border: 0;
        border-radius: 999px;
        color: var(--color-surface-0);
        background: var(--accent);
        box-shadow: 0 0.9rem 2.4rem color-mix(in srgb, var(--accent) 35%, transparent);
        font: inherit;
        font-size: 1.08rem;
        font-weight: 800;
        cursor: pointer;
        transition: transform 120ms ease-out, background 120ms ease-out;
        touch-action: manipulation;
      }

      #session-button:hover:not(:disabled) {
        background: var(--accent-hi);
        transform: translateY(-1px);
      }

      #session-button:focus-visible {
        outline: 2px solid var(--accent-hi);
        outline-offset: 2px;
      }

      #session-button:disabled {
        color: var(--color-ink-3);
        background: var(--color-surface-2);
        box-shadow: none;
        cursor: wait;
      }

      body:not([data-voice-state="idle"]):not([data-voice-state="error"])
        #session-button:not(:disabled) {
        color: #fff1f2;
        background: var(--color-status-alert);
        box-shadow: 0 0.9rem 2.4rem color-mix(in srgb, var(--color-status-alert) 30%, transparent);
      }

      /* Mode toggle: Live (bronze, today's path) vs. Spar (teal, $0
         cascade). Only choosable before a session starts — once a session
         is active the choice is locked in (mirrored onto <body data-mode>)
         until the next Start. */
      #mode-toggle {
        display: inline-flex;
        gap: 0.15rem;
        padding: 0.15rem;
        border: 1px solid var(--color-line);
        border-radius: 999px;
        background: var(--color-surface-2);
      }

      #mode-toggle button {
        border: 0;
        border-radius: 999px;
        padding: 0.3rem 0.7rem;
        font: inherit;
        font-size: 0.68rem;
        font-weight: 750;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--color-ink-2);
        background: transparent;
        cursor: pointer;
      }

      #mode-toggle button[aria-checked="true"] {
        color: var(--color-surface-0);
      }

      #mode-toggle button[data-mode-option="live"][aria-checked="true"] {
        background: var(--color-bronze);
      }

      #mode-toggle button[data-mode-option="spar"][aria-checked="true"] {
        background: var(--color-spar);
      }

      #mode-toggle button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      #mode-badge[data-mode="spar"] {
        border-color: var(--color-spar);
        color: var(--color-spar-hi);
      }

      #talk-button {
        min-height: 4.25rem;
        border: 0;
        border-radius: 999px;
        color: var(--color-surface-0);
        background: var(--color-spar);
        box-shadow: 0 0.9rem 2.4rem color-mix(in srgb, var(--color-spar) 35%, transparent);
        font: inherit;
        font-size: 1.02rem;
        font-weight: 800;
        cursor: pointer;
        touch-action: none;
        user-select: none;
      }

      #talk-button[data-recording="true"] {
        background: var(--color-spar-hi);
      }

      #talk-button:disabled {
        color: var(--color-ink-3);
        background: var(--color-surface-2);
        box-shadow: none;
        cursor: wait;
      }

      @media (min-width: 42rem) {
        main {
          padding-inline: 1.5rem;
          gap: 1.25rem;
        }

        .state-card {
          min-height: 19rem;
        }

        .transcript-card {
          padding: 1.5rem;
        }
      }

      @media (min-width: 64rem) {
        main {
          width: min(100%, 74rem);
          grid-template-columns: minmax(0, 5fr) minmax(0, 4fr);
          grid-template-rows: auto 1fr auto;
          grid-template-areas:
            "brand transcript"
            "state transcript"
            "actions transcript";
        }

        .brand {
          grid-area: brand;
        }

        .state-card {
          grid-area: state;
        }

        .action-bar {
          grid-area: actions;
        }

        .transcript-card {
          grid-area: transcript;
          display: flex;
          flex-direction: column;
          max-height: calc(100svh - 2.5rem);
          overflow: hidden;
        }

        #transcript {
          flex: 1;
          min-height: 0;
          overflow-y: auto;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          scroll-behavior: auto !important;
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }
    </style>
    <script src="/voice/app.js" defer></script>
  </head>
  <body data-voice-state="idle">
    <main>
      <header class="brand">
        <img src="/voice/icon.svg" alt="" width="32" height="32" />
        <h1>Hermes Voice</h1>
        <div id="mode-toggle" role="radiogroup" aria-label="Sprachmodus">
          <button
            type="button"
            data-mode-option="live"
            role="radio"
            aria-checked="true"
          >
            Live
          </button>
          <button
            type="button"
            data-mode-option="spar"
            role="radio"
            aria-checked="false"
          >
            Spar
          </button>
        </div>
        <span id="mode-badge" hidden></span>
        <button id="install-chip" type="button" class="chip-button" hidden>Installieren</button>
        <button
          id="camera-chip"
          type="button"
          class="chip-button"
          aria-pressed="false"
          title="Kamera für Hermes freigeben"
        >
          📷 Kamera
        </button>
        <button
          id="screen-chip"
          type="button"
          class="chip-button"
          aria-pressed="false"
          title="Bildschirm für Hermes freigeben"
        >
          🖥️ Bildschirm
        </button>
        <span id="screen-share-hint" class="share-hint" role="status" hidden>
          Bildschirmteilen wird von Chrome auf Android noch nicht unterstützt.
          Nutze die Kamera oder einen Desktop-Browser.
        </span>
        <span id="sharing-indicator" class="sharing-indicator" hidden>
          <span class="sharing-dot" aria-hidden="true"></span>
          <span>teilt</span>
        </span>
        <video
          id="sharing-preview"
          class="sharing-preview"
          autoplay
          muted
          playsinline
          hidden
        ></video>
      </header>

      <section class="state-card" aria-labelledby="voice-status">
        <div class="status-orb" aria-hidden="true"></div>
        <div class="state-copy" role="status" aria-live="polite" aria-atomic="true">
          <p id="voice-status">bereit</p>
          <p id="status-detail">Starte eine sichere Sprachsitzung, wenn du bereit bist.</p>
          <div id="usage-meter" class="usage-meter" hidden>
            <div class="usage-meter-track">
              <div id="usage-meter-fill" class="usage-meter-fill"></div>
            </div>
            <p id="usage-line" class="usage-line" hidden></p>
          </div>
        </div>
      </section>

      <section class="transcript-card" aria-labelledby="transcript-title">
        <h2 class="section-title" id="transcript-title">Gespräch</h2>
        <div id="transcript" aria-live="polite" aria-relevant="additions text"></div>
        <p id="transcript-empty">Noch kein Gespräch.</p>
        <form id="composer">
          <input
            id="composer-input"
            type="text"
            placeholder="Oder schreib Hermes …"
            aria-label="Nachricht an Hermes"
            aria-disabled="true"
            autocomplete="off"
            maxlength="4000"
          />
          <button id="composer-submit" type="submit">Senden</button>
        </form>
      </section>

      <div class="action-bar">
        <button
          id="talk-button"
          type="button"
          hidden
          aria-label="Gedrückt halten zum Sprechen"
        >
          Gedrückt halten zum Sprechen
        </button>
        <button id="session-button" type="button" aria-label="Sprachsitzung starten">
          Start
        </button>
      </div>
    </main>
  </body>
</html>
