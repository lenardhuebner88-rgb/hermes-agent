# Kuratierter Engine/Modell-Katalog fürs Dashboard-Dropdown (Loop-Runner v1).
# Struktur: engines.<name>.{label, models}. "models: []" heißt "Katalog-Eintrag ohne
# Adapter" (Dashboard zeigt die Engine, aber Start ist gesperrt).
# Codex-Modell 2026-07-09 gegen `~/.codex/config.toml` geprüft:
# default_model = "gpt-5.6-sol"; gpt-5.5/gpt-5.3-codex bleiben als bewiesene
# Fallbacks im Katalog.
# neuralwatt-Modelle: Liste kuratiert; live geprüft 2026-07-03 gegen
# GET /v1/models (API liefert 16 IDs: glm-5.2 ±fast/flex/short-Varianten,
# kimi-k2.6 ±fast/flex, kimi-k2.7-code ±flex, qwen3.5-397b ±fast, qwen3.6-35b ±fast).
engines:
  claude:
    label: "Claude (Abo)"
    models: [claude-fable-5, claude-opus-4-8, claude-sonnet-5, claude-haiku-4-5]
  kimi:
    label: "Kimi (Coding-Abo)"
    models: [kimi-code/kimi-for-coding]
  codex:
    label: "Codex (ChatGPT-Abo)"
    models: [gpt-5.6-sol, gpt-5.5, gpt-5.3-codex]
  hermes:
    # "Modell" = Hermes-PROFIL; das Profil trägt die Provider-/Modell-Bindung.
    # reviewer → glm-5.2 @ NeuralWatt · coder → Codex-Pool (live verifiziert 2026-07-02).
    label: "Hermes-Profil (NeuralWatt/Codex-Pool via Abo)"
    models: [reviewer, coder]
  neuralwatt:
    label: "NeuralWatt (Abo)"
    models: [glm-5.2, glm-5.2-flex, kimi-k2.7-code, kimi-k2.6-fast, qwen3.5-397b-fast]
