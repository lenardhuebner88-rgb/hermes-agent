# hermes-feature-forge — Epic-getriebene Feature-Pipeline fürs /control-Dashboard.
# Rollenvertrag: Planner plant ein Epic aus der SEED-Roadmap und dekomponiert in
# bis zu 3 Kontrakt-Pläne, Builder baut je Plan einen Commit, Verifier prüft
# adversarial. Effektive Routen: pack.yaml + Overrides. Landung: --cmd land
# (Morgen-Gate); Auto-Land kommt erst mit dem Sprint-2-Runner-Vertrag nach 5
# sauberen manuellen Landungen (Leiter im Plan 2026-07-18-projekt-loops-v2.md).
name: hermes-feature-forge
type: pipeline
description: Planner plant ein belegtes /control-Feature-Epic (1-3 Plaene), Builder baut Full-Stack, Verifier prueft mit Gates + Browser-Evidenz; Routen aus pack.yaml/Overrides
stability: experimental
repo: /home/piet/.hermes/hermes-agent
phases:
  plan:
    engine: claude
    model: claude-opus-4-8
    timeout: 2700
    prompt: PLANNER-PROMPT.md
  build:
    engine: codex
    model: gpt-5.6-sol
    timeout: 5400
    prompt: BUILDER-PROMPT.md
  verify:
    engine: claude
    model: claude-opus-4-8
    timeout: 2700
    prompt: VERIFIER-PROMPT.md
stop:
  max_rounds: 4
  max_hours: 6
  fail_streak: 2
  dry_rounds: 1
params:
  max_plans: "3"
  scope_allow: "web/src/control/** hermes_cli/** tests/**"
  scope_deny: "hermes_cli/auth.py hermes_cli/dashboard_auth/** hermes_cli/kanban_db.py web/package.json web/package-lock.json package*.json .env* config"
  viewports: "390x844 820x1180 1366x900"
notify:
  discord_channel: "1486480074491559966"
autoland: false
