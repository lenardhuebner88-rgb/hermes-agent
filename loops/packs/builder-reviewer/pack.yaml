# builder-reviewer — Referenz-Pack (migrierter Fable-Nachtloop).
# Rollenvertrag: Planner plant Schwachstellen-Fixes als Plan-Dateien, Builder
# baut einen Plan pro Runde (Cross-Family), Verifier prüft adversarial.
# Effektive Routen: pack.yaml + Overrides. Design-Doc:
# vault/03-Agents/Claude-Code/plans/2026-07-02-loop-runner-v1-v2.md
name: builder-reviewer
type: pipeline
description: Planner plant Schwachstellen-Fixes, Builder implementiert, Verifier prueft adversarial; Routen aus pack.yaml/Overrides
stability: stable
repo: /home/piet/.hermes/hermes-agent
phases:
  plan:
    engine: claude
    model: claude-opus-4-8
    timeout: 2400
    prompt: PLANNER-PROMPT.md
  build:
    engine: codex
    model: gpt-5.6-sol
    timeout: 3600
    prompt: BUILDER-PROMPT.md
  verify:
    engine: claude
    model: claude-opus-4-8
    timeout: 2400
    prompt: VERIFIER-PROMPT.md
stop:
  max_rounds: 12
  max_hours: 7
  fail_streak: 2
params:
  max_plans: "8"
  focus: "Hermes-Board/Kanban-Robustheit + /control-Dashboard (Backend bevorzugt; Frontend nur wenn HAS_WEB=1)"
notify:
  discord_channel: "1486480074491559966"
autoland: false
