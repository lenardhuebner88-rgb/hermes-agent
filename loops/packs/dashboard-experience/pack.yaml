# Auto-Landung ist im Runner an Repo-Pfad, Live-Repo, Rollen/Modelle und SHA-256
# dieses Manifests sowie aller drei Prompts gebunden. Drift ist fail-closed.
name: dashboard-experience
type: pipeline
description: Fable findet einen belegten Dashboard-UX-Slice, GPT-5.6 Sol baut ihn, Fable verifiziert visuell; genau ein PASS-Commit darf automatisch landen
stability: experimental
repo: /home/piet/.hermes/hermes-agent
phases:
  plan:
    engine: claude
    model: claude-fable-5
    timeout: 2700
    prompt: PLANNER-PROMPT.md
  build:
    engine: codex
    model: gpt-5.6-sol
    timeout: 3600
    prompt: BUILDER-PROMPT.md
  verify:
    engine: claude
    model: claude-fable-5
    timeout: 2700
    prompt: VERIFIER-PROMPT.md
stop:
  max_rounds: 1
  max_hours: 2
  fail_streak: 1
  dry_rounds: 1
params:
  max_plans: "1"
  routes: "/control /control/fleet /control/agent-terminals /control/statistik /control/loops /control/orchestrator /control/system /control/research /control/bibliothek /control/design-board /control/schmiede /control/stratege"
  viewports: "390x844 820x1180 1366x900"
notify:
  discord_channel: "1486480074491559966"
autoland: true
