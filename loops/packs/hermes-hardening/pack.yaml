# hermes-hardening — Zwei-Linsen-Härtungs-Pipeline (UI-Design · Backend-Robustheit).
# Rollenvertrag: Planner wählt pro Nacht die am stärksten belegte Schwäche aus
# einer der beiden Linsen, Builder härtet, Verifier prüft adversarial.
# Effektive Routen: pack.yaml + Overrides. Landung: --cmd land; Auto-Land erst
# mit Sprint-2-Vertrag nach 3 sauberen manuellen Landungen
# (Plan 2026-07-18-projekt-loops-v2.md).
name: hermes-hardening
type: pipeline
description: Planner findet die staerkste belegte Schwaeche (UI-Design-Ratchet oder FastAPI-Robustheit), Builder haertet, Verifier prueft adversarial; Routen aus pack.yaml/Overrides
stability: experimental
repo: /home/piet/.hermes/hermes-agent
phases:
  plan:
    engine: claude
    model: claude-opus-4-8
    timeout: 2700
    prompt: PLANNER-PROMPT.md
  build:
    engine: codex
    model: gpt-5.6-sol
    timeout: 5400
    prompt: BUILDER-PROMPT.md
  verify:
    engine: claude
    model: claude-opus-4-8
    timeout: 2700
    prompt: VERIFIER-PROMPT.md
stop:
  max_rounds: 3
  max_hours: 5
  fail_streak: 2
  dry_rounds: 1
params:
  max_plans: "2"
  scope_allow: "web/src/control/** hermes_cli/** tests/**"
  scope_deny: "hermes_cli/auth.py hermes_cli/dashboard_auth/** hermes_cli/kanban_db.py web/package.json web/package-lock.json package*.json .env* config"
  viewports: "390x844 820x1180 1366x900"
  lenses: "ui-design backend-robustheit"
notify:
  discord_channel: "1486480074491559966"
autoland: false
