# dashboard-polish — UI-Politur-Pipeline für web/src/control (Erbe des loop-dashboard-
# Harnesses). Adaption der builder-reviewer-Pipeline mit Frontend-Fokus + Frontend-Gates.
name: dashboard-polish
type: pipeline
description: Fable plant UI-Politur an web/src/control, Sonnet baut, Fable verifiziert mit Frontend-Gates
stability: experimental
repo: /home/piet/.hermes/hermes-agent
phases:
  plan:
    engine: claude
    model: claude-fable-5
    timeout: 2400
    prompt: PLANNER-PROMPT.md
  build:
    engine: claude
    model: claude-sonnet-5
    timeout: 3600
    prompt: BUILDER-PROMPT.md
  verify:
    engine: claude
    model: claude-fable-5
    timeout: 2400
    prompt: VERIFIER-PROMPT.md
stop:
  max_rounds: 12
  max_hours: 7
  fail_streak: 2
params:
  max_plans: "5"
  focus: "web/src/control Politur"
notify:
  discord_channel: "1486480074491559966"
autoland: false
