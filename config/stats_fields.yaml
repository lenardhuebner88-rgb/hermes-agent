# Declarative field config for the /control Stats tab (Statistik + Abo-Limits-Cockpit).
#
# These definitions used to be hardcoded across the frontend (StatistikView,
# AccountUsageTile, accountUsage). They now live here and are served at runtime via
# `GET /api/stats-config` (TTL+mtime cached, fail-soft to built-in defaults).
#
# Edit this file to change the rendered provider/window/lane fields — their labels,
# their order, or their visibility — WITHOUT a code change or frontend rebuild. The
# change is picked up on the next poll (≈ backend TTL 30 s + frontend poll 60 s).
# A missing or malformed file degrades gracefully to the built-in defaults, so a bad
# edit can never blank the stats tab.
version: 1

# Provider cards in the Abo-Limits-Cockpit (one card per subscription with a real
# usage window). `lane` is the worker-run reconciliation lane (null = API-billed, no
# subscription bucket). Order here = display/grouping order. `visible: false` hides a
# provider entirely (card + footer) without deleting its definition — declutter knob.
providers:
  - id: anthropic
    label: Claude
    lane: claude
    usage_role: subscription
    visible: true
  - id: openai-codex
    label: ChatGPT / Codex
    lane: chatgpt
    usage_role: subscription
    visible: true
  - id: kimi
    label: Kimi
    lane: kimi
    usage_role: subscription
    visible: true
  - id: xai
    label: Grok
    lane: grok
    usage_role: subscription
    visible: true
  - id: openrouter
    label: OpenRouter
    lane: null
    usage_role: spend
    visible: true

# Provider usage windows. `kind` drives layout: every session/weekly window
# renders as a primary horizontal bar (one bar per window — 5h-Fenster, Diese
# Woche and the model-scoped cap are three bars); `other` collapses into the
# per-card "Details" disclosure. `label` is the German display label shown next
# to the bar (the window `detail`, e.g. the model name, is appended as " · …").
windows:
  - key: session
    label: 5-Std-Fenster
    kind: session
  - key: weekly
    label: Diese Woche
    kind: weekly
  - key: opus_week
    label: Opus-Woche
    kind: other
  - key: sonnet_week
    label: Sonnet-Woche
    kind: other
  # Model-scoped weekly cap (Anthropic `limits[].weekly_scoped`); the model name
  # rides in the window `detail`, appended to the label ("Modell-Limit · Fable").
  # kind=weekly → own primary bar (Operator-Spec 2026-07-21: Fable explizit).
  - key: scoped_week
    label: Modell-Limit
    kind: weekly

# Subscription token buckets (Abo-Token panel + per-card worker-run reconciliation).
# `key` must match a provider `lane` above. Order = display order; `visible: false`
# drops a bucket from the panel.
subscription_lanes:
  - key: chatgpt
    label: ChatGPT/Codex Abo
    visible: true
  - key: claude
    label: Claude Max Abo
    visible: true
  - key: kimi
    label: Kimi Abo
    visible: true
  - key: grok
    label: Grok Abo
    visible: true
